services:
  postgres:
    image: postgres:16-alpine
    container_name: buro-postgres
    environment:
      POSTGRES_USER: buro
      POSTGRES_PASSWORD: buro
      POSTGRES_DB: buro
    ports:
      - "5432:5432"
    volumes:
      - buro_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: buro-redis
    ports:
      - "6379:6379"
    volumes:
      - buro_redis_data:/data

volumes:
  buro_postgres_data:
  buro_redis_data:
